services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  agent-platform:
    build:
      context: ./portfolio/agent-platform
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QDRANT_BASE_URL=http://qdrant:6333
      - QDRANT_COLLECTION=agent_docs
      - CORS_ALLOW_ORIGINS=http://127.0.0.1:3000,http://localhost:3000
      # DeepResearch 外网搜索（二选一，写入 .env 后 compose 自动加载）
      # - TAVILY_API_KEY=tvly-...
      # - SERPER_API_KEY=...
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  agent-web:
    build:
      context: ./portfolio/agent-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      agent-platform:
        condition: service_healthy
